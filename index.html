<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Cat (ACAT) | Official</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* Logo Color Theme: Cyan/Blue */
        :root { --primary: #00e5ff; --primary-glow: rgba(0, 229, 255, 0.4); --bg: #030508; --glass: rgba(255, 255, 255, 0.01); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; overflow: hidden; scroll-behavior: smooth; }
        
        /* Floating 3D Background Particles */
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .particle { position: absolute; background: var(--primary-glow); border-radius: 50%; filter: blur(60px); animation: float 12s infinite alternate ease-in-out; }

        @keyframes float { from { transform: translate(0,0); opacity: 0.2; } to { transform: translate(60px, 60px); opacity: 0.5; } }

        /* Welcome Animation */
        .welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 999; display: flex; align-items: center; justify-content: center; animation: fadeOut 1.5s forwards; animation-delay: 2s; }
        .welcome-text { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); opacity: 0; animation: fadeIn 1s forwards ease-in; animation-delay: 0.5s; }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        .container { max-width: 420px; margin: auto; padding: 80px 20px 50px; text-align: center; }
        
        /* 3D Glass Card Design */
        .card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(0, 229, 255, 0.08); border-radius: 40px; padding: 50px 30px; box-shadow: 0 40px 80px rgba(0,0,0,0.8); position: relative; transition: 0.3s; transform: perspective(1000px); }
        .card:hover { transform: translateY(-5px); border-color: rgba(0, 229, 255, 0.2); box-shadow: 0 50px 90px rgba(0, 229, 255, 0.1); }
        
        /* Logo Float & Pulse Animation */
        .logo-img { width: 140px; filter: drop-shadow(0 0 25px var(--primary-glow)); animation: logoFloat 4s ease-in-out infinite; margin-bottom: 20px; }
        @keyframes logoFloat { 0%, 100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.03) translateY(-10px); } }

        /* Updated Color for Aero Cat */
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2.6rem; color: var(--primary); letter-spacing: 4px; margin: 15px 0; text-shadow: 0 0 20px var(--primary-glow); animation: textGlow 2s infinite alternate; }
        @keyframes textGlow { from { text-shadow: 0 0 10px var(--primary-glow); } to { text-shadow: 0 0 25px var(--primary); } }
        
        .badge { background: rgba(0, 229, 255, 0.08); color: var(--primary); border: 1px solid var(--primary); padding: 8px 25px; border-radius: 50px; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Contract Address Box */
        .address-box { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 20px; border: 1px dashed rgba(0, 229, 255, 0.3); font-size: 0.75rem; word-break: break-all; margin: 35px 0; font-family: monospace; color: #add8e6; cursor: pointer; position: relative; }
        .address-box:hover { border-color: var(--primary); background: rgba(0, 229, 255, 0.05); }
        .address-box::after { content: 'COPIED'; position: absolute; top: 10px; right: 20px; background: var(--primary); color: black; padding: 2px 8px; border-radius: 5px; font-size: 0.6rem; font-weight: bold; opacity: 0; transition: 0.3s; }
        .address-box.copied::after { opacity: 1; top: 5px; }

        /* Detail Stats */
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-card { background: rgba(255,255,255,0.015); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.04); transition: 0.3s; transform: perspective(500px) rotateX(10deg); }
        .stat-card:hover { background: rgba(0, 229, 255, 0.03); transform: perspective(500px) rotateX(0deg); }
        .stat-card h4 { color: var(--primary); font-size: 0.65rem; text-transform: uppercase; margin-bottom: 5px; opacity: 0.7; letter-spacing: 1px; }
        .stat-card p { font-size: 1.1rem; font-weight: bold; font-family: 'Orbitron', sans-serif; }

        /* Action Button */
        .btn { display: block; width: 100%; padding: 20px; background: var(--primary); color: black; text-decoration: none; border-radius: 20px; font-weight: 900; margin-top: 35px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; box-shadow: 0 10px 30px var(--primary-glow); }
        .btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 45px var(--primary-glow); }
        .btn:active { transform: scale(0.98); }

    </style>
</head>
<body>
    <div class="welcome-screen">
        <div class="welcome-text">WELCOME TO ACAT</div>
    </div>

    <div class="bg-animate">
        <div class="particle" style="width: 350px; height: 350px; top: -10%; left: -10%;"></div>
        <div class="particle" style="width: 250px; height: 250px; bottom: 10%; right: 10%;"></div>
        <div class="particle" style="width: 150px; height: 150px; top: 50%; left: 30%; animation-duration: 15s;"></div>
    </div>

    <div class="container">
        <div class="card">
            <img src="https://raw.githubusercontent.com/aerocatofficial/aerocatofficial.github.io/main/Aero-Cat.svg" class="logo-img">
            <h1>Aero Cat</h1>
            <span class="badge">ACAT Token</span>
            
            <div class="address-box" onclick="copyAddress()" id="addr-box">
                <i class="far fa-copy" style="margin-right: 10px;"></i> 0xf305Efbfc43134FB37cd8BB3D7868a5E68272316
            </div>

            <div class="detail-grid">
                <div class="stat-card"><h4>Total Supply</h4><p>20M</p></div>
                <div class="stat-card"><h4>Tax</h4><p>0%</p></div>
                <div class="stat-card"><h4>Liquidity</h4><p>Locked</p></div>
                <div class="stat-card"><h4>Network</h4><p>BSC</p></div>
            </div>

            <a href="https://bscscan.com/token/0xf305Efbfc43134FB37cd8BB3D7868a5E68272316" class="btn">Explore on BscScan</a>
        </div>
        
        <p style="margin-top: 40px; font-size: 0.7rem; opacity: 0.3; letter-spacing: 1px;">© 2026 AERO CAT PROJECT. ALL RIGHTS RESERVED.</p>
    </div>

    <script>
        // Copy to clipboard function
        function copyAddress() {
            const addr = "0xf305Efbfc43134FB37cd8BB3D7868a5E68272316";
            navigator.clipboard.writeText(addr).then(() => {
                const box = document.getElementById('addr-box');
                box.classList.add('copied');
                setTimeout(() => box.classList.remove('copied'), 2000);
            });
        }
    </script>
</body>
</html>
