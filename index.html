<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Cat | Created by EnAmor</title>
    <style>
        :root { --primary: #00e5ff; --bg: #00050a; --glass: rgba(0, 229, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow-x: hidden; }

        /* Animated Dark Void Background */
        .void { position: fixed; width: 100vw; height: 100vh; z-index: -1; background: radial-gradient(circle at 50% 50%, #001a22 0%, #000 100%); }
        .energy-line { position: absolute; background: var(--primary); opacity: 0.1; box-shadow: 0 0 20px var(--primary); animation: moveLine 10s infinite linear; }
        @keyframes moveLine { from { transform: translateY(-100vh) rotate(45deg); } to { transform: translateY(100vh) rotate(45deg); } }

        /* The Hidden Creator Name (EnAmor) */
        .creator-hint { position: fixed; bottom: 20px; left: 20px; font-size: 0.6rem; opacity: 0.1; transition: 1s; letter-spacing: 5px; }
        .creator-hint:hover { opacity: 0.8; color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 50px 20px; }

        /* Floating 3D Logo */
        .logo-box { perspective: 1000px; margin-bottom: 30px; }
        .logo-main { 
            width: 280px; filter: drop-shadow(0 0 40px var(--primary)); 
            animation: float 5s infinite ease-in-out;
            transition: 0.2s;
        }
        @keyframes float { 0%, 100% { transform: translateY(0) rotateY(0deg); } 50% { transform: translateY(-30px) rotateY(20deg); } }

        h1 { font-size: 5rem; letter-spacing: 15px; text-transform: uppercase; color: #fff; text-shadow: 0 0 30px var(--primary); margin-bottom: 20px; }

        /* Financial Weapon Card */
        .weapon-card { 
            background: var(--glass); border: 1px solid rgba(0, 229, 255, 0.2); 
            padding: 40px; border-radius: 0px; backdrop-filter: blur(20px);
            max-width: 600px; position: relative; overflow: hidden;
        }
        .weapon-card::before { content: 'POWER'; position: absolute; top: -10px; left: -10px; font-size: 5rem; opacity: 0.05; font-weight: 900; }

        .btn-trade { 
            display: inline-block; margin-top: 40px; padding: 20px 50px; 
            background: none; border: 1px solid var(--primary); color: var(--primary);
            font-weight: bold; text-decoration: none; letter-spacing: 5px;
            transition: 0.5s;
        }
        .btn-trade:hover { background: var(--primary); color: #000; box-shadow: 0 0 50px var(--primary); }

        /* Sukuna Presence (Glitch Effect) */
        .sukuna-spirit { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 15vw; opacity: 0.02; pointer-events: none; z-index: -1; }
    </style>
</head>
<body>

    <div class="void" id="voidLines"></div>
    <div class="sukuna-spirit">RYOMEN</div>

    <div class="container">
        <div class="logo-box">
            <img src="https://raw.githubusercontent.com/aerocatofficial/aerocatofficial.github.io/main/Aero-Cat.svg" class="logo-main" id="acat-logo">
        </div>

        <h1>Aero Cat</h1>
        
        <div class="weapon-card">
            <p style="font-size: 1.2rem; line-height: 1.8; letter-spacing: 2px;">
                Designed for those who seek dominance. <br>
                A financial instrument built on the BSC Network. <br>
                <b>0% TAX. NO SOCIALS. NO MERCY.</b>
            </p>
        </div>

        <a href="https://bscscan.com/token/0xf305Efbfc43134FB37cd8BB3D7868a5E68272316" class="btn-trade">EXECUTE CONTRACT</a>
    </div>

    <div class="creator-hint">CREATOR: ENAMOR</div>

    <script>
        // Interactive Lines
        const voidLines = document.getElementById('voidLines');
        for(let i=0; i<20; i++) {
            let line = document.createElement('div');
            line.className = 'energy-line';
            line.style.width = '1px';
            line.style.height = '100vh';
            line.style.left = Math.random() * 100 + 'vw';
            line.style.animationDelay = Math.random() * 10 + 's';
            voidLines.appendChild(line);
        }

        // Logo Mouse Follow
        document.addEventListener('mousemove', (e) => {
            const logo = document.getElementById('acat-logo');
            let x = (window.innerWidth / 2 - e.pageX) / 20;
            let y = (window.innerHeight / 2 - e.pageY) / 20;
            logo.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
